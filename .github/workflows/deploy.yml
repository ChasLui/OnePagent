name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stage site
        run: |
          mkdir -p _site
          cp onepagent.html _site/index.html
          cp onepagent.html _site/onepagent.html
          cp logo.svg _site/logo.svg
          cp manifest.webmanifest _site/manifest.webmanifest
          cp sw.js _site/sw.js
          mkdir -p _site/icons
          cp icons/*.png icons/*.ico _site/icons/
          cp README.md _site/README.md
          cp README.zh.md _site/README.zh.md
          echo "onepagent.top" > _site/CNAME

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
